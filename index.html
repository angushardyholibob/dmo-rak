<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visit Ras Al Khaimah — RAK Moments</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="nav-wrap">
    <nav class="nav">
      <a class="nav-logo" href="#" aria-label="Visit Ras Al Khaimah">
        <svg viewBox="0 0 90 42" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M4 30 L18 8 L30 26 L42 10 L54 28 L66 12 L82 30" fill="none" stroke="#C8102E" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="nav-logo-text">Ras Al Khaimah</span>
      </a>

      <ul class="nav-links">
        <li><a href="#">Offers</a></li>
        <li><a href="#">Be Inspired</a></li>
        <li><a href="#">Where to stay</a></li>
        <li><a href="#">Things to do</a></li>
        <li><a href="#">Plan Your Trip</a></li>
      </ul>

      <div class="nav-actions">
        <button class="nav-lang" type="button">
          <span class="flag" aria-hidden="true"></span>
          <span>EN</span>
          <svg viewBox="0 0 12 8" width="10" height="7" aria-hidden="true"><path d="M1 1l5 5 5-5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="nav-icon-btn" type="button">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><rect x="3" y="5" width="18" height="16" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M3 9h18M8 3v4M16 3v4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          <span>Events</span>
        </button>
        <button class="nav-icon-btn" type="button">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M20 20l-4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          <span>Search</span>
        </button>
      </div>
    </nav>
  </header>

  <section class="hero">
    <div class="hero-media">
      <img src="https://images.unsplash.com/photo-1578469645742-46cae010e5d4?auto=format&fit=crop&w=2400&q=80" alt="Aerial view of Ras Al Khaimah mangroves" />
      <div class="hero-scrim"></div>
    </div>
    <div class="hero-content">
      <p class="hero-eyebrow">RAK</p>
      <h1 class="hero-title">MOMENTS</h1>
      <a href="#" class="hero-cta">Exclusive Staycation Offers</a>
    </div>
  </section>

  <section class="stay">
    <div class="stay-inner">
      <div class="stay-heading">
        <span class="stay-ghost">WHERE</span>
        <h2>WHERE TO STAY</h2>
      </div>
      <div class="stay-pills" role="tablist">
        <button class="pill is-active" role="tab" aria-selected="true">Luxury Hotels</button>
        <button class="pill" role="tab">Beach Resorts</button>
        <button class="pill" role="tab">Desert</button>
        <button class="pill" role="tab">Mountain Lodges</button>
        <button class="pill" role="tab">Family</button>
        <button class="pill" role="tab">City</button>
        <button class="pill" role="tab">Unique Stays</button>
        <button class="pill" role="tab">Romantic Villa Stays</button>
      </div>
    </div>
  </section>
</body>
</html>
